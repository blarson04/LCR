# Streamlit theme — the fine-grained look is done with injected CSS in the app;
# this sets the base (dark) palette so native widgets match.
[theme]
base = "dark"
primaryColor = "#2DD4BF"          # bright teal accent (reads well on dark)
backgroundColor = "#0C1118"       # near-black page
secondaryBackgroundColor = "#131A23"
textColor = "#E6EDF3"             # near-white
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
