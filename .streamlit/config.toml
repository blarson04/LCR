# Baseline theme per the screener-site-design skill; ui/theme.py CSS refines it.
[theme]
base = "light"
primaryColor = "#2C6E63"
backgroundColor = "#FBFBF9"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1B2A3B"
font = "sans serif"

[client]
toolbarMode = "minimal"

[browser]
gatherUsageStats = false
